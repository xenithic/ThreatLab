{% extends 'base.html' %}

{% block title %}Search Results{% endblock %}

{% block content %}
<div class="lab-container">
    <h2>Product Search</h2>
    <p class="description">Search our product catalog by ID.</p>

    <div style="margin-top: 1.5rem;">
        <form action="/search" method="GET" class="lab-form">
            <input type="text" name="id" placeholder="Enter product ID (e.g. 1, 2, 3)" class="input-field" value="{{ query }}" required>
            <button type="submit" class="btn">Search</button>
        </form>
    </div>

    {% if results %}
    <div class="output-container" style="margin-top: 2rem;">
        <h4>Query Results:</h4>
        <pre class="command-output">{{ results }}</pre>
    </div>
    {% endif %}

    <div style="margin-top: 2rem;">
        <a href="{{ url_for('lab_sqlmap') }}" class="btn btn-secondary">&lt; Back to Lab</a>
    </div>
</div>
{% endblock %}
