{% extends 'base.html' %}

{% block title %}Register — ThreatLab{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <span class="auth-icon">📝</span>
            <h2>Register</h2>
            <p class="auth-subtitle">Create a new ThreatLab account</p>
        </div>

        {% if error %}
        <div class="auth-error">{{ error }}</div>
        {% endif %}

        <form method="POST" action="{{ url_for('register') }}" class="auth-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" class="input-field" placeholder="Choose a username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" class="input-field" placeholder="Choose a password" required>
            </div>
            <button type="submit" class="btn auth-btn">Register</button>
        </form>

        <p class="auth-footer">
            Already have an account? <a href="{{ url_for('login') }}">Login here</a>
        </p>
    </div>
</div>
{% endblock %}
